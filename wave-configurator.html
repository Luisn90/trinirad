<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Gradient Configurator — TRINIRAD</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0E12; --panel:#16161C; --border:#2A2A35;
  --accent:#6A0D91; --accent2:#00C6CC; --text:#E8E8F0;
  --muted:#7070A0; --input:#1E1E2A;
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* CANVAS */
#preview{position:fixed;inset:0;z-index:0}

/* OVERLAY UI */
.ui{position:fixed;inset:0;z-index:10;display:flex;pointer-events:none}

/* PANEL */
.panel{
  width:320px;height:100vh;
  background:rgba(14,14,18,0.92);
  border-right:1px solid var(--border);
  backdrop-filter:blur(20px);
  display:flex;flex-direction:column;
  pointer-events:all;
  overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.panel-head{
  padding:1.2rem 1.4rem .8rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.panel-title{font-size:.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.panel-sub{font-size:.82rem;font-weight:600;color:var(--text)}

.section{padding:.8rem 1.4rem;border-bottom:1px solid var(--border)}
.section-label{font-size:.62rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem}

/* COLOR SWATCHES */
.colors-grid{display:flex;flex-direction:column;gap:.5rem}
.color-row{display:flex;align-items:center;gap:.6rem}
.color-row label{font-size:.72rem;color:var(--muted);width:48px;flex-shrink:0}
.swatch-wrap{position:relative;flex:1}
.swatch-input{
  -webkit-appearance:none;appearance:none;
  width:100%;height:32px;border:none;border-radius:6px;cursor:pointer;
  background:transparent;padding:0;
}
.swatch-input::-webkit-color-swatch-wrapper{padding:0}
.swatch-input::-webkit-color-swatch{border:1.5px solid var(--border);border-radius:6px}
.hex-display{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);margin-top:2px;text-align:center}

/* SLIDERS */
.slider-row{margin-bottom:.7rem}
.slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.slider-name{font-size:.75rem;color:var(--text);font-weight:500}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent2);font-weight:600}
.slider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:3px;border-radius:99px;outline:none;cursor:pointer;
  background:var(--border);
}
.slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--accent2);border:2px solid var(--bg);
  box-shadow:0 0 6px rgba(0,198,204,0.5);
  cursor:pointer;
}
.slider::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--accent2);border:2px solid var(--bg);cursor:pointer;
}

/* PRESET COLORS */
.presets{display:flex;gap:.4rem;flex-wrap:wrap}
.preset-chip{
  padding:.3rem .7rem;border-radius:99px;font-size:.65rem;font-weight:600;
  cursor:pointer;border:1.5px solid var(--border);color:var(--muted);
  background:var(--input);transition:all .2s;
}
.preset-chip:hover{border-color:var(--accent2);color:var(--accent2)}

/* CODE OUTPUT */
.code-block{
  background:var(--input);border-radius:8px;padding:.8rem;
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  color:#A0D0FF;line-height:1.6;overflow-x:auto;
  white-space:pre;border:1px solid var(--border);
  max-height:160px;overflow-y:auto;
}
.copy-btn{
  width:100%;margin-top:.6rem;padding:.6rem;border-radius:6px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;font-family:'Poppins',sans-serif;
  font-size:.75rem;font-weight:700;cursor:pointer;transition:opacity .2s;
}
.copy-btn:hover{opacity:.85}
.copy-btn.copied{background:linear-gradient(135deg,#1A7A3A,#00C6CC)}

/* CANVAS LABELS */
.canvas-info{
  position:fixed;top:1.5rem;right:1.5rem;z-index:20;
  background:rgba(14,14,18,0.7);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:10px;
  padding:.6rem 1rem;font-size:.7rem;color:var(--muted);
  pointer-events:none;
}
.canvas-info span{color:var(--text);font-weight:600}

@media(max-width:600px){
  .panel{width:100vw;height:50vh;position:fixed;bottom:0;top:auto;border-right:none;border-top:1px solid var(--border)}
  #preview{height:50vh}
}
</style>
</head>
<body>

<canvas id="preview"></canvas>

<div class="canvas-info">Live preview — <span>Wave Gradient Shader</span></div>

<div class="ui">
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">TRINIRAD 2026</div>
      <div class="panel-sub">Wave Gradient Configurator</div>
    </div>

    <!-- COLORS -->
    <div class="section">
      <div class="section-label">Colors</div>
      <div class="colors-grid">
        <div class="color-row"><label>Color 1</label><div class="swatch-wrap"><input type="color" class="swatch-input" id="c1" value="#6A0D91"><div class="hex-display" id="c1hex">#6A0D91</div></div></div>
        <div class="color-row"><label>Color 2</label><div class="swatch-wrap"><input type="color" class="swatch-input" id="c2" value="#D60036"><div class="hex-display" id="c2hex">#D60036</div></div></div>
        <div class="color-row"><label>Color 3</label><div class="swatch-wrap"><input type="color" class="swatch-input" id="c3" value="#00C6CC"><div class="hex-display" id="c3hex">#00C6CC</div></div></div>
        <div class="color-row"><label>Color 4</label><div class="swatch-wrap"><input type="color" class="swatch-input" id="c4" value="#F56A00"><div class="hex-display" id="c4hex">#F56A00</div></div></div>
        <div class="color-row"><label>Base</label><div class="swatch-wrap"><input type="color" class="swatch-input" id="c5" value="#FFFFFF"><div class="hex-display" id="c5hex">#FFFFFF</div></div></div>
      </div>

      <div style="margin-top:.8rem">
        <div class="section-label" style="margin-bottom:.4rem">Presets</div>
        <div class="presets">
          <div class="preset-chip" onclick="applyPreset('trinirad')">TRINIRAD</div>
          <div class="preset-chip" onclick="applyPreset('framer')">Framer default</div>
          <div class="preset-chip" onclick="applyPreset('ocean')">Ocean</div>
          <div class="preset-chip" onclick="applyPreset('sunset')">Sunset</div>
        </div>
      </div>
    </div>

    <!-- SLIDERS -->
    <div class="section">
      <div class="section-label">Wave Parameters</div>
      <div class="slider-row"><div class="slider-header"><span class="slider-name">Speed</span><span class="slider-val" id="v-speed">0.84</span></div><input type="range" class="slider" id="s-speed" min="0" max="3" step="0.01" value="0.84"></div>
      <div class="slider-row"><div class="slider-header"><span class="slider-name">Freq X</span><span class="slider-val" id="v-freqx">2.5</span></div><input type="range" class="slider" id="s-freqx" min="0.1" max="8" step="0.1" value="2.5"></div>
      <div class="slider-row"><div class="slider-header"><span class="slider-name">Freq Y</span><span class="slider-val" id="v-freqy">6</span></div><input type="range" class="slider" id="s-freqy" min="0.1" max="12" step="0.1" value="6"></div>
      <div class="slider-row"><div class="slider-header"><span class="slider-name">Amplitude</span><span class="slider-val" id="v-amp">3</span></div><input type="range" class="slider" id="s-amp" min="0.1" max="8" step="0.1" value="3"></div>
      <div class="slider-row"><div class="slider-header"><span class="slider-name">Angle</span><span class="slider-val" id="v-angle">-54°</span></div><input type="range" class="slider" id="s-angle" min="-180" max="180" step="1" value="-54"></div>
      <div class="slider-row"><div class="slider-header"><span class="slider-name">Softness</span><span class="slider-val" id="v-soft">1.67</span></div><input type="range" class="slider" id="s-soft" min="0.1" max="5" step="0.01" value="1.67"></div>
      <div class="slider-row"><div class="slider-header"><span class="slider-name">Blend (fade)</span><span class="slider-val" id="v-blend">0.74</span></div><input type="range" class="slider" id="s-blend" min="0" max="1" step="0.01" value="0.74"></div>
      <div class="slider-row"><div class="slider-header"><span class="slider-name">Seed</span><span class="slider-val" id="v-seed">27</span></div><input type="range" class="slider" id="s-seed" min="1" max="100" step="1" value="27"></div>
    </div>

    <!-- CODE -->
    <div class="section">
      <div class="section-label">Export Parameters</div>
      <pre class="code-block" id="code-output"></pre>
      <button class="copy-btn" id="copy-btn" onclick="copyCode()">Copiar parámetros</button>
    </div>

  </div>
</div>

<script>
// ── WebGL Wave Gradient ──
const canvas = document.getElementById('preview');
const gl = canvas.getContext('webgl', {antialias:true});

let W, H;
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  gl.viewport(0,0,W,H);
}
window.addEventListener('resize', resize);
resize();

const VS = `attribute vec2 a; void main(){ gl_Position=vec4(a,0.,1.); }`;

const FS = `
precision highp float;
uniform float u_t, u_speed, u_fx, u_fy, u_amp, u_angle, u_soft, u_blend, u_seed;
uniform vec3 u_c1, u_c2, u_c3, u_c4, u_c5;
uniform vec2 u_res;

vec3 permute(vec3 x){ return mod(((x*34.)+1.)*x,289.); }
float snoise(vec2 v){
  const vec4 C=vec4(.211324865405187,.366025403784439,-.577350269189626,.024390243902439);
  vec2 i=floor(v+dot(v,C.yy)), x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.,0.):vec2(0.,1.);
  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;
  i=mod(i,289.);
  vec3 p=permute(permute(i.y+vec3(0.,i1.y,1.))+i.x+vec3(0.,i1.x,1.));
  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
  m=m*m*m*m;
  vec3 x=2.*fract(p*C.www)-1., h=abs(x)-.5, ox=floor(x+.5), a0=x-ox;
  m*=1.79284291400159-.85373472095314*(a0*a0+h*h);
  vec3 g; g.x=a0.x*x0.x+h.x*x0.y; g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.*dot(m,g);
}

vec3 pal(float t){
  t=clamp(t*.5+.5,0.,1.)*4.;
  int i=int(t); float f=fract(t);
  if(i==0) return mix(u_c5,u_c1,f);
  if(i==1) return mix(u_c1,u_c2,f);
  if(i==2) return mix(u_c2,u_c3,f);
  return mix(u_c3,u_c4,f);
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res; uv.y=1.-uv.y;
  float ca=cos(u_angle), sa=sin(u_angle);
  vec2 ruv=vec2(ca*uv.x-sa*uv.y, sa*uv.x+ca*uv.y);
  float seed=u_seed*.1;
  float t=u_t*u_speed*.12;
  float n1=snoise(vec2(ruv.x*u_fx+t+seed, ruv.y*u_fy-t*.7+seed));
  float n2=snoise(vec2(ruv.x*u_fx*.7-t*.5+seed*1.3, ruv.y*u_fy*1.4+t+seed));
  float n3=snoise(vec2(ruv.x*u_fx*1.5+t*.3+seed*.7, ruv.y*u_fy*.6-t*1.2+seed*1.7));
  float n4=snoise(vec2(ruv.x*u_fx*.5-t*.2+seed*2., ruv.y*u_fy*2.+t*.4+seed*.5));
  float n=(n1*.45+n2*.3+n3*.15+n4*.1)*(u_amp*.25);
  float sn=snoise(vec2(ruv.x*1.5+t*.3, ruv.y*2.-t*.2))*.12;
  n=mix(n, n+sn, u_soft*.25);
  vec3 col=pal(n);
  float fade=smoothstep(.38-.1*u_blend, .75+.1*u_blend, uv.y);
  col=mix(col, u_c5, fade*u_blend);
  float vign=1.-smoothstep(.65,1.2,length((uv-.5)*1.5));
  col=mix(u_c5,col,vign*.9+.1);
  gl_FragColor=vec4(col,1.);
}`;

function mkS(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s,src); gl.compileShader(s);
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, mkS(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, mkS(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog); gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aloc = gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(aloc);
gl.vertexAttribPointer(aloc,2,gl.FLOAT,false,0,0);

const U = {
  t:    gl.getUniformLocation(prog,'u_t'),
  res:  gl.getUniformLocation(prog,'u_res'),
  speed:gl.getUniformLocation(prog,'u_speed'),
  fx:   gl.getUniformLocation(prog,'u_fx'),
  fy:   gl.getUniformLocation(prog,'u_fy'),
  amp:  gl.getUniformLocation(prog,'u_amp'),
  angle:gl.getUniformLocation(prog,'u_angle'),
  soft: gl.getUniformLocation(prog,'u_soft'),
  blend:gl.getUniformLocation(prog,'u_blend'),
  seed: gl.getUniformLocation(prog,'u_seed'),
  c1:   gl.getUniformLocation(prog,'u_c1'),
  c2:   gl.getUniformLocation(prog,'u_c2'),
  c3:   gl.getUniformLocation(prog,'u_c3'),
  c4:   gl.getUniformLocation(prog,'u_c4'),
  c5:   gl.getUniformLocation(prog,'u_c5'),
};

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  return [r,g,b];
}

function getParams(){
  return {
    speed: parseFloat(document.getElementById('s-speed').value),
    fx:    parseFloat(document.getElementById('s-freqx').value),
    fy:    parseFloat(document.getElementById('s-freqy').value),
    amp:   parseFloat(document.getElementById('s-amp').value),
    angle: parseFloat(document.getElementById('s-angle').value) * Math.PI/180,
    soft:  parseFloat(document.getElementById('s-soft').value),
    blend: parseFloat(document.getElementById('s-blend').value),
    seed:  parseFloat(document.getElementById('s-seed').value),
    c1: hexToRgb(document.getElementById('c1').value),
    c2: hexToRgb(document.getElementById('c2').value),
    c3: hexToRgb(document.getElementById('c3').value),
    c4: hexToRgb(document.getElementById('c4').value),
    c5: hexToRgb(document.getElementById('c5').value),
  };
}

function frame(ts){
  const p = getParams();
  gl.uniform1f(U.t, ts*.001);
  gl.uniform2f(U.res, W, H);
  gl.uniform1f(U.speed, p.speed);
  gl.uniform1f(U.fx,    p.fx);
  gl.uniform1f(U.fy,    p.fy);
  gl.uniform1f(U.amp,   p.amp);
  gl.uniform1f(U.angle, p.angle);
  gl.uniform1f(U.soft,  p.soft);
  gl.uniform1f(U.blend, p.blend);
  gl.uniform1f(U.seed,  p.seed);
  gl.uniform3fv(U.c1, p.c1);
  gl.uniform3fv(U.c2, p.c2);
  gl.uniform3fv(U.c3, p.c3);
  gl.uniform3fv(U.c4, p.c4);
  gl.uniform3fv(U.c5, p.c5);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── CONTROLS ──
const sliders = ['speed','freqx','freqy','amp','angle','soft','blend','seed'];
const labels  = {angle: v => `${v}°`, speed: v=>v, freqx:v=>v, freqy:v=>v, amp:v=>v, soft:v=>v, blend:v=>v, seed:v=>v};

sliders.forEach(id => {
  const el = document.getElementById(`s-${id}`);
  const vl = document.getElementById(`v-${id}`);
  el.addEventListener('input', () => {
    const v = el.value;
    vl.textContent = id === 'angle' ? `${v}°` : v;
    updateCode();
  });
});

['c1','c2','c3','c4','c5'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    document.getElementById(`${id}hex`).textContent = el.value.toUpperCase();
    updateCode();
  });
});

function updateCode(){
  const p = {
    color1:  document.getElementById('c1').value.toUpperCase(),
    color2:  document.getElementById('c2').value.toUpperCase(),
    color3:  document.getElementById('c3').value.toUpperCase(),
    color4:  document.getElementById('c4').value.toUpperCase(),
    base:    document.getElementById('c5').value.toUpperCase(),
    speed:   document.getElementById('s-speed').value,
    freqX:   document.getElementById('s-freqx').value,
    freqY:   document.getElementById('s-freqy').value,
    amplitude: document.getElementById('s-amp').value,
    angle:   document.getElementById('s-angle').value,
    softness:document.getElementById('s-soft').value,
    blend:   document.getElementById('s-blend').value,
    seed:    document.getElementById('s-seed').value,
  };
  document.getElementById('code-output').textContent =
`Colors:    ${p.color1}, ${p.color2}
           ${p.color3}, ${p.color4}
Base:      ${p.base}
Speed:     ${p.speed}
Freq X:    ${p.freqX}
Freq Y:    ${p.freqY}
Amplitude: ${p.amplitude}
Angle:     ${p.angle}°
Softness:  ${p.softness}
Blend:     ${p.blend}
Seed:      ${p.seed}`;
}
updateCode();

// ── PRESETS ──
const PRESETS = {
  trinirad: { c1:'#6A0D91', c2:'#D60036', c3:'#00C6CC', c4:'#F56A00', c5:'#FFFFFF', speed:0.84, fx:2.5, fy:6, amp:3, angle:-54, soft:1.67, blend:0.74, seed:27 },
  framer:   { c1:'#CC0099', c2:'#4940FF', c3:'#FFFFFF', c4:'#CC0099', c5:'#FFFFFF', speed:0.84, fx:2.5, fy:6, amp:3, angle:-54, soft:1.67, blend:0.74, seed:27 },
  ocean:    { c1:'#00728C', c2:'#00C6CC', c3:'#4940FF', c4:'#0A2463', c5:'#F0FAFF', speed:0.6,  fx:2.0, fy:5, amp:2.5, angle:-30, soft:2, blend:0.6, seed:42 },
  sunset:   { c1:'#D60036', c2:'#F56A00', c3:'#FFD700', c4:'#6A0D91', c5:'#FFF8F0', speed:0.5,  fx:1.8, fy:4, amp:2,   angle:20,  soft:1.5, blend:0.8, seed:15 },
};

function applyPreset(name){
  const p = PRESETS[name];
  document.getElementById('c1').value = p.c1;
  document.getElementById('c2').value = p.c2;
  document.getElementById('c3').value = p.c3;
  document.getElementById('c4').value = p.c4;
  document.getElementById('c5').value = p.c5;
  ['c1','c2','c3','c4','c5'].forEach(id => {
    document.getElementById(`${id}hex`).textContent = document.getElementById(id).value.toUpperCase();
  });
  document.getElementById('s-speed').value = p.speed;  document.getElementById('v-speed').textContent = p.speed;
  document.getElementById('s-freqx').value = p.fx;     document.getElementById('v-freqx').textContent = p.fx;
  document.getElementById('s-freqy').value = p.fy;     document.getElementById('v-freqy').textContent = p.fy;
  document.getElementById('s-amp').value   = p.amp;    document.getElementById('v-amp').textContent   = p.amp;
  document.getElementById('s-angle').value = p.angle;  document.getElementById('v-angle').textContent = `${p.angle}°`;
  document.getElementById('s-soft').value  = p.soft;   document.getElementById('v-soft').textContent  = p.soft;
  document.getElementById('s-blend').value = p.blend;  document.getElementById('v-blend').textContent = p.blend;
  document.getElementById('s-seed').value  = p.seed;   document.getElementById('v-seed').textContent  = p.seed;
  updateCode();
}

function copyCode(){
  const text = document.getElementById('code-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar parámetros'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
